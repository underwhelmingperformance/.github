name: actions-lint

on:
  pull_request:
  merge_group:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  actionlint:
    name: actionlint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Install actionlint
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          tmp="$(mktemp -d)"
          gh release download v1.7.12 \
            --repo rhysd/actionlint \
            --pattern actionlint_1.7.12_checksums.txt \
            --pattern actionlint_1.7.12_linux_amd64.tar.gz \
            --dir "$tmp"

          (
            cd "$tmp"
            grep ' actionlint_1.7.12_linux_amd64.tar.gz$' actionlint_1.7.12_checksums.txt | sha256sum -c -
          )

          tar -xzf "$tmp/actionlint_1.7.12_linux_amd64.tar.gz" -C "$tmp"
          install -m 0755 "$tmp/actionlint" "$RUNNER_TEMP/actionlint"
          echo "$RUNNER_TEMP" >> "$GITHUB_PATH"

      - run: actionlint -no-color

  zizmor:
    name: zizmor
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - uses: zizmorcore/zizmor-action@6599ee8b7a49aef6a770f63d261d214911a7ce02 # v0.6.0
        with:
          advanced-security: false
          annotations: true
          inputs: .github/workflows
          persona: pedantic
          version: 1.27.0
