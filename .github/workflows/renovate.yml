name: Renovate

on:
  schedule:
    # Offset by 12 minutes to avoid busy times on the hour.
    - cron: 12 */4 * * *

  pull_request:
    paths:
      - renovate-config.json
      - renovate-config.json5
      - .github/workflows/renovate.yml

  push:
    branches:
      - main
    paths:
      - renovate-config.json
      - renovate-config.json5
      - .github/workflows/renovate.yml

  workflow_dispatch:
    inputs:
      dry-run:
        description: "Run Renovate in dry-run mode"
        required: false
        default: false
        type: boolean

      debug:
        description: "Run Renovate in debug mode"
        required: false
        default: false
        type: boolean

permissions: {}

concurrency:
  group: renovate
  cancel-in-progress: false

jobs:
  renovate:
    name: renovate
    permissions:
      contents: read

    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout Code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          sparse-checkout: |
            renovate-config.json
            renovate-config.json5
            .github/renovate-entrypoint.sh

      - name: Generate token
        id: generate-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.MOVEROFTHINGS_APP_ID }}
          private-key: ${{ secrets.MOVEROFTHINGS_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }} # zizmor: ignore[github-app] Org-wide Renovate autodiscovery needs every repository available to the app installation.
          permission-contents: write
          permission-issues: write
          permission-pull-requests: write
          permission-statuses: write
          permission-vulnerability-alerts: read
          permission-workflows: write

      - name: Self-hosted Renovate
        uses: renovatebot/github-action@22e0a16091fc706b04affe6ae53d5e3358ac4023 # v46.1.19
        with:
          configurationFile: renovate-config.json5
          # renovate: datasource=docker depName=ghcr.io/renovatebot/renovate
          renovate-version: 43.260.2@sha256:8eabe48179e3f69baf1495336c6c4fdd8b11d03dc603dd7fc5a29422a2fdd905
          token: ${{ steps.generate-token.outputs.token }}
          # Install a real Nix into the container before Renovate starts, so
          # post-upgrade tasks that build a flake substitute from cache.nixos.org
          # instead of compiling the toolchain from source. Root is needed to
          # install the package and write /etc/nix.
          docker-cmd-file: .github/renovate-entrypoint.sh
          docker-user: root
        env:
          LOG_LEVEL:
            ${{ ((github.event_name == 'workflow_dispatch' && inputs.debug) ||
            (github.event_name == 'pull_request')) && 'debug' || 'info' }}
          # Repositories opt in to `postUpgradeTasks` in their own Renovate
          # config; only commands matching this list may run. Any bare pnpm
          # script is allowed, with no arguments or shell metacharacters.
          RENOVATE_ALLOWED_COMMANDS: '["^pnpm [A-Za-z0-9:._-]+$"]'
          RENOVATE_AUTODISCOVER: "true"
          RENOVATE_AUTODISCOVER_FILTER: "underwhelmingperformance/*"
          RENOVATE_DRY_RUN:
            ${{ (github.event_name == 'pull_request' || (github.event_name ==
            'workflow_dispatch' && github.event.inputs.dry-run == 'true')) &&
            'full' || null }}
          RENOVATE_ONBOARDING: "false"
          RENOVATE_PLATFORM: github
          RENOVATE_REQUIRE_CONFIG: optional
